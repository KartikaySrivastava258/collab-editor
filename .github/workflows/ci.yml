name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Go Backend — zero external dependencies, pure stdlib
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Go — Build, Vet & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 go build -v ./...

      - name: Test with race detector
        working-directory: backend
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend

  # ────────────────────────────────────────────────────────────────────────────
  # React Frontend
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: React — Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          CI: false

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests

  # ────────────────────────────────────────────────────────────────────────────
  # Docker — build and smoke-test the server image
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker — Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t collab-editor-backend:ci .

      - name: Smoke test — health endpoint
        run: |
          docker run -d -p 8080:8080 --name smoke collab-editor-backend:ci
          sleep 2
          curl -sf http://localhost:8080/health | grep -q '"status":"ok"'
          docker stop smoke
          echo "✓ Health check passed"
